<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>煤矿智能化常态化运行管理系统 - 首页</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg-base: #e8ecf0;
  --bg-card: #ffffff;
  --border: #d0d7de;
  --text-primary: #1a2332;
  --text-secondary: #5a6475;
  --text-muted: #9aa0ab;
  --accent-blue: #2563eb;
  --accent-blue-light: rgba(37,99,235,0.08);
  --accent-green: #16a34a;
  --accent-red: #dc2626;
  --accent-amber: #d97706;
  --accent-purple: #9333ea;
  --radius: 12px;
  --radius-sm: 8px;
  --gap: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  min-height: 100vh;
}

.header { height: 60px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; }
.header .logo { font-size: 16px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 30px; height: 30px; background: var(--accent-blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.header-time { font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.header-user { font-size: 13px; color: var(--text-secondary); }

.main-wrapper { display: flex; min-height: calc(100vh - 60px); }

.sidebar { width: 64px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 3px; flex-shrink: 0; }
.sidebar-item { width: 46px; height: 46px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-radius: 10px; cursor: pointer; color: var(--text-muted); font-size: 9px; transition: all 0.2s; }
.sidebar-item:hover { background: #f5f7fa; color: var(--text-secondary); }
.sidebar-item.active { background: var(--accent-blue-light); color: var(--accent-blue); }
.sidebar-item .icon { font-size: 18px; }

.content { flex: 1; padding: 16px; min-width: 0; }
.breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

/* MAIN GRID: 10 rows x 52px each, 4 columns */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(10, 52px);
  gap: var(--gap);
}

/* CARD */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-divider { border-bottom: 1px solid var(--border); margin: 0 -12px 8px; flex-shrink: 0; }

/* OVERVIEW */
.overview-stat { display: flex; flex-direction: column; gap: 5px; flex: 1; overflow: hidden; }
.overview-item { display: flex; flex-direction: column; gap: 1px; }
.overview-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
.overview-value { font-size: 12px; color: var(--text-primary); font-weight: 500; line-height: 1.3; }
.overview-value.red { color: var(--accent-red); font-weight: 700; }
.overview-value.orange { color: var(--accent-amber); font-weight: 700; }
.overview-value.green { color: var(--accent-green); font-weight: 700; }
.overview-value.large { font-size: 18px; font-weight: 800; line-height: 1; }
.overview-bar { height: 4px; background: #e8ecf0; border-radius: 2px; overflow: hidden; margin-top: 1px; }
.overview-bar-fill { height: 100%; border-radius: 2px; }

/* RADAR */
.radar-card { padding: 12px; }
.radar-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; position: relative; overflow: hidden; }
#radarChart { width: 85% !important; height: auto !important; }
.result-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.95); border: 1px solid var(--border); border-radius: 14px; padding: 8px 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); min-width: 90px; z-index: 1; }
.result-badge.fail { border-color: rgba(220,38,38,0.25); }
.result-badge .label { font-size: 10px; color: var(--accent-red); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 2px; }
.result-badge .score { font-size: 28px; font-weight: 900; color: var(--accent-red); line-height: 1; }
.result-badge .unit { font-size: 10px; color: var(--accent-red); font-weight: 500; }
.result-badge.pass { border-color: rgba(22,163,74,0.25); }
.result-badge.pass .label { color: var(--accent-green); }
.result-badge.pass .score { color: var(--accent-green); }
.result-badge.pass .unit { color: var(--accent-green); }
.eval-conclusion { width: 100%; text-align: center; font-size: 10px; color: var(--text-muted); background: #f5f7fa; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; border-left: 3px solid var(--accent-blue); flex-shrink: 0; }

/* QUICK TILES */
.quick-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex: 1; align-content: start; }
.tile { background: #f5f7fa; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; }
.tile:hover { background: var(--accent-blue-light); border-color: var(--accent-blue); }
.tile-icon { display: flex; align-items: center; justify-content: center; }
.tile-label { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-align: center; }

/* SUBSYSTEM */
.subsystem-list { display: flex; flex-direction: column; gap: 3px; flex: 1; overflow-y: auto; }
.subsystem-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; background: #f5f7fa; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.subsystem-item:hover { background: var(--accent-blue-light); border-color: var(--accent-blue); }
.subsystem-name { font-size: 11px; color: var(--text-secondary); }
.subsystem-status { display: flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-dot.ok { background: var(--accent-green); }
.status-dot.warn { background: var(--accent-amber); }
.status-dot.err { background: var(--accent-red); animation: pulse-err 2s infinite; }
@keyframes pulse-err { 0%,100%{opacity:1}50%{opacity:0.4} }
.status-text.ok { color: var(--accent-green); }
.status-text.warn { color: var(--accent-amber); }
.status-text.err { color: var(--accent-red); }

/* SCORE BAR */
.score-list { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
.score-item { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.score-label { font-size: 11px; color: var(--text-secondary); width: 64px; flex-shrink: 0; }
.score-bar-wrap { flex: 1; height: 5px; background: #e8ecf0; border-radius: 3px; overflow: visible; position: relative; }
.score-pass-line { position: absolute; left: 70%; top: -2px; bottom: -2px; width: 1px; background: rgba(0,0,0,0.1); }
.score-bar { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; }
.score-bar.high { background: var(--accent-blue); }
.score-bar.mid { background: var(--accent-amber); }
.score-bar.low { background: var(--accent-red); }
.score-num { font-size: 11px; font-weight: 700; width: 24px; text-align: right; flex-shrink: 0; }
.score-num.high { color: var(--accent-blue); }
.score-num.mid { color: var(--accent-amber); }
.score-num.low { color: var(--accent-red); }

/* MINI CARD */
.mini-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; overflow: hidden; display: flex; flex-direction: column; }
.mini-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mini-card-title { font-size: 13px; font-weight: 600; color: #1a2332; display: flex; align-items: center; gap: 8px; }
.mini-card-count { font-size: 10px; color: var(--text-muted); background: #f5f7fa; padding: 2px 7px; border-radius: 8px; border: 1px solid var(--border); }

.data-table { width: 100%; border-collapse: collapse; flex: 1; overflow: hidden; }
.data-table th { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding: 0 6px 6px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.data-table td { padding: 5px 6px; font-size: 11px; color: #5a6475; border-bottom: 1px solid #f0f2f5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--accent-blue-light); }
.blue-link { color: var(--accent-blue); cursor: pointer; text-decoration: none; }
.blue-link:hover { text-decoration: underline; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 5px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.tag.ok { background: rgba(22,163,74,0.1); color: var(--accent-green); }
.tag.warn { background: rgba(220,38,38,0.1); color: var(--accent-red); }

.pagination { display: flex; align-items: center; gap: 3px; margin-top: 8px; justify-content: flex-end; flex-shrink: 0; }
.pagination button { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.pagination button:hover { background: #f5f7fa; }
.pagination button.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.pagination-info { font-size: 10px; color: var(--text-muted); margin-left: 6px; }

.notice-list { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
.notice-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.notice-item:last-child { border-bottom: none; }
.notice-item:hover { background: var(--accent-blue-light); border-radius: 6px; padding-left: 6px; }
.notice-icon { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; margin-top: 1px; }
.notice-icon.urgent { background: rgba(220,38,38,0.1); color: var(--accent-red); }
.notice-icon.warn { background: rgba(217,119,6,0.1); color: var(--accent-amber); }
.notice-icon.info { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.notice-icon.normal { background: #f5f7fa; color: var(--text-muted); }
.notice-body { flex: 1; min-width: 0; }
.notice-title { font-size: 11px; color: #5a6475; line-height: 1.4; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.notice-tag { font-size: 9px; padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }
.notice-tag.urgent { background: rgba(220,38,38,0.1); color: var(--accent-red); }
.notice-tag.new { background: rgba(22,163,74,0.1); color: var(--accent-green); }
.notice-tag.info { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.notice-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon"><i data-lucide="building" style="width:16px;height:16px;color:#fff;"></i></div>
    煤矿智能化常态化运行管理系统
  </div>
  <div class="header-right">
    <div class="header-time" id="clock">--:--:--</div>
    <div class="header-user">王矿长</div>
  </div>
</div>

<div class="main-wrapper">
  <div class="sidebar">
    <div class="sidebar-item active"><div class="icon"><i data-lucide="home" style="width:18px;height:18px;"></i></div><span>首页</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="bar-chart-2" style="width:18px;height:18px;"></i></div><span>评价</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="file-text" style="width:18px;height:18px;"></i></div><span>台账</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="graduation-cap" style="width:18px;height:18px;"></i></div><span>培训</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="monitor" style="width:18px;height:18px;"></i></div><span>监控</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i></div><span>管控</span></div>
    <div class="sidebar-item"><div class="icon"><i data-lucide="settings" style="width:18px;height:18px;"></i></div><span>设置</span></div>
  </div>

  <div class="content">
    <div class="breadcrumb">首页</div>

    <div class="grid">

      <!-- 基本概况: col1-2, row1-3 (跨2列跨2行) -->
      <div class="card" style="grid-column: 1 / 3; grid-row: 1 / 4;">
        <div class="card-header">
          <div class="card-title"><span class="card-dot" style="background:var(--accent-blue)"></span>基本概况</div>
        </div>
        <div class="card-divider"></div>
        <div class="overview-stat">
          <div class="overview-item"><span class="overview-label">矿井名称</span><span class="overview-value">XXX煤矿</span></div>
          <div class="overview-item"><span class="overview-label">评价周期</span><span class="overview-value">2026年5月</span></div>
          <div class="overview-item">
            <span class="overview-label">综合得分</span>
            <span class="overview-value large red">40<span style="font-size:12px;font-weight:400">分</span></span>
            <div class="overview-bar"><div class="overview-bar-fill" style="width:40%;background:var(--accent-red)"></div></div>
          </div>
          <div class="overview-item"><span class="overview-label">达标情况</span><span class="overview-value red">距合格线差30分</span></div>
          <div class="overview-item"><span class="overview-label">一票否决</span><span class="overview-value orange">9项存在否决项</span></div>
          <div class="overview-item"><span class="overview-label">加分情况</span><span class="overview-value green">无加分项</span></div>
          <div class="overview-item"><span class="overview-label">下次评价</span><span class="overview-value">2026年06月25日</span></div>
        </div>
      </div>

      <!-- 雷达图: col3-4, row1-6 (跨2列跨4行) -->
      <div class="card radar-card" style="grid-column: 3 / 5; grid-row: 1 / 6;">
        <div class="card-header">
          <div class="card-title"><span class="card-dot" style="background:var(--accent-blue)"></span>综合评价雷达图</div>
        </div>
        <div class="card-divider"></div>
        <div class="radar-body">
          <div style="width:85%;">
            <canvas id="radarChart"></canvas>
          </div>
          <div class="result-badge fail">
            <div class="label">评价结果</div>
            <div class="score">40</div>
            <div class="unit">分 &middot; 不合格</div>
          </div>
          <div class="eval-conclusion">距合格线（70分）差30分，需重点提升综采、掘进，信息基础设施等系统</div>
        </div>
      </div>

      <!-- 快捷入口: col1-2, row4 -->
      <div class="card" style="grid-column: 1 / 3; grid-row: 4;">
        <div class="card-header">
          <div class="card-title"><span class="card-dot" style="background:var(--accent-amber)"></span>快捷入口</div>
        </div>
        <div class="card-divider"></div>
        <div class="quick-tiles">
          <div class="tile"><div class="tile-icon"><i data-lucide="building-2" style="width:18px;height:18px;color:var(--accent-blue);"></i></div><div class="tile-label">管理机构</div></div>
          <div class="tile"><div class="tile-icon"><i data-lucide="file-check" style="width:18px;height:18px;color:var(--accent-amber);"></i></div><div class="tile-label">管理制度</div></div>
          <div class="tile"><div class="tile-icon"><i data-lucide="scroll-text" style="width:18px;height:18px;color:var(--accent-green);"></i></div><div class="tile-label">政策解读</div></div>
          <div class="tile"><div class="tile-icon"><i data-lucide="calendar-clock" style="width:18px;height:18px;color:var(--accent-purple);"></i></div><div class="tile-label">培训计划</div></div>
        </div>
      </div>

      <!-- 系统评价: col1-2, row5-9 (跨2列跨4行) -->
      <div class="card" style="grid-column: 1 / 3; grid-row: 5 / 9;">
        <div class="card-header">
          <div class="card-title"><span class="card-dot" style="background:var(--accent-red)"></span>系统评价得分</div>
        </div>
        <div class="card-divider"></div>
        <div class="score-list" id="scoreList"></div>
      </div>

      <!-- 智能化系统: col3-4, row6-10 (跨2列跨4行) -->
      <div class="card" style="grid-column: 3 / 5; grid-row: 6 / 10;">
        <div class="card-header">
          <div class="card-title"><span class="card-dot" style="background:var(--accent-purple)"></span>智能化系统</div>
        </div>
        <div class="card-divider"></div>
        <div class="subsystem-list" id="subsystemList"></div>
      </div>

      <!-- 底部三栏: col1-4, row10-11 (全宽跨2行) -->
      <div class="mini-card" style="grid-column: 1 / 5; grid-row: 10 / 11;">
        <div class="mini-card-header">
          <div class="mini-card-title"><span class="card-dot" style="background:var(--accent-blue)"></span>运维计划</div>
          <span class="mini-card-count">28条</span>
        </div>
        <table class="data-table">
          <thead><tr><th>#</th><th>创建人</th><th>计划名称</th><th>时间</th></tr></thead>
          <tbody id="maintenanceTable"></tbody>
        </table>
        <div class="pagination">
          <button>&laquo;</button><button>1</button><button class="active">2</button><button>3</button><button>&raquo;</button>
          <span class="pagination-info">共28条</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
var systems = [
  {name:"综采系统",score:78},{name:"掘进系统",score:65},{name:"主运输系统",score:82},
  {name:"辅助运输系统",score:55},{name:"地质保障系统",score:30},{name:"通风系统",score:70},
  {name:"排水系统",score:48},{name:"供电系统",score:75},{name:"压风系统",score:62},
  {name:"信息基础设施",score:42}
];
var subsystems = [
  {name:"综采系统",status:"ok"},{name:"掘进系统",status:"warn"},{name:"主运输系统",status:"ok"},
  {name:"辅助运输系统",status:"warn"},{name:"地质保障系统",status:"err"},{name:"通风系统",status:"ok"},
  {name:"排水系统",status:"warn"},{name:"供电系统",status:"ok"},{name:"压风系统",status:"warn"},
  {name:"信息基础设施",status:"err"}
];
var maintenanceData = [
  {id:1,person:"张三",name:"综采面设备月度检修",time:"2026-05-25"},
  {id:2,person:"李四",name:"主运输皮带检测",time:"2026-05-25"},
  {id:3,person:"王五",name:"排水系统巡检",time:"2026-05-26"},
  {id:4,person:"赵六",name:"通风系统月度检测",time:"2026-05-26"},
  {id:5,person:"钱七",name:"供电系统绝缘检测",time:"2026-05-26"}
];

function renderScoreList() {
  var c = document.getElementById("scoreList");
  var html = "";
  for (var i = 0; i < systems.length; i++) {
    var s = systems[i];
    var cls = s.score >= 70 ? "high" : s.score >= 50 ? "mid" : "low";
    html += "<div class='score-item'>" +
      "<span class='score-label'>" + s.name + "</span>" +
      "<div class='score-bar-wrap'><div class='score-pass-line'></div><div class='score-bar " + cls + "' style='width:" + s.score + "%'></div></div>" +
      "<span class='score-num " + cls + "'>" + s.score + "</span></div>";
  }
  c.innerHTML = html;
}

function renderSubsystemList() {
  var c = document.getElementById("subsystemList");
  var sm = {ok:"正常",warn:"预警",err:"异常"};
  var sc = {ok:"ok",warn:"warn",err:"err"};
  var html = "";
  for (var i = 0; i < subsystems.length; i++) {
    var s = subsystems[i];
    html += "<div class='subsystem-item'><span class='subsystem-name'>" + s.name + "</span>" +
      "<span class='subsystem-status'><span class='status-dot " + sc[s.status] + "'></span>" +
      "<span class='status-text " + sc[s.status] + "'>" + sm[s.status] + "</span></span></div>";
  }
  c.innerHTML = html;
}

function renderMaintenanceTable() {
  var tb = document.getElementById("maintenanceTable");
  var html = "";
  for (var i = 0; i < maintenanceData.length; i++) {
    var r = maintenanceData[i];
    html += "<tr><td>" + r.id + "</td><td>" + r.person + "</td>" +
      "<td><span class='blue-link'>" + r.name + "</span></td><td>" + r.time + "</td></tr>";
  }
  tb.innerHTML = html;
}

function renderRadarChart() {
  var ctx = document.getElementById("radarChart").getContext("2d");
  new Chart(ctx, {
    type: "radar",
    data: {
      labels: systems.map(function(s){return s.name;}),
      datasets: [{
        data: systems.map(function(s){return s.score;}),
        fill: true,
        backgroundColor: "rgba(37,99,235,0.1)",
        borderColor: "#2563eb",
        borderWidth: 2,
        pointBackgroundColor: "#2563eb",
        pointRadius: 3,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 100, ticks: { stepSize: 20, font: { size: 10 }, color: "#9aa0ab", backdropColor: "transparent" },
          pointLabels: { font: { size: 10 }, color: "#5a6475" },
          angleLines: { color: "rgba(208,215,222,0.8)" },
          grid: { color: "rgba(208,215,222,0.8)" }
        }
      }
    }
  });
}

function updateClock() {
  var now = new Date();
  var el = document.getElementById("clock");
  if (el) el.textContent = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0") + ":" + String(now.getSeconds()).padStart(2,"0");
}
setInterval(updateClock, 1000);
updateClock();

renderScoreList();
renderSubsystemList();
renderMaintenanceTable();
renderRadarChart();
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</body>
</html>
