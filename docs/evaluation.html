<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>评价中心 - 煤矿智能化常态化运行管理系统</title><script src="https://unpkg.com/lucide@latest"></script><style>
:root {
  --bg-base: #e8ecf0;
  --bg-card: #ffffff;
  --border: #d0d7de;
  --text-primary: #1a2332;
  --text-secondary: #5a6475;
  --text-muted: #9aa0ab;
  --accent-blue: #2563eb;
  --accent-blue-light: rgba(37,99,235,0.08);
  --accent-green: #16a34a;
  --accent-red: #dc2626;
  --accent-amber: #d97706;
  --accent-purple: #9333ea;
  --radius: 14px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  min-height: 100vh;
}

/* HEADER */
.header {
  height: 60px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header .logo { font-size: 16px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 30px; height: 30px; background: var(--accent-blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.header-time { font-size: 13px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.header-user { font-size: 13px; color: var(--text-secondary); }

/* LAYOUT */
.main-wrapper { display: flex; min-height: calc(100vh - 60px); }

/* SIDEBAR */
.sidebar { width: 64px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 14px 0; gap: 3px; flex-shrink: 0; }
.sidebar-item { width: 46px; height: 46px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-radius: 12px; cursor: pointer; color: var(--text-muted); font-size: 9px; transition: all 0.2s; }
.sidebar-item:hover { background: #f5f7fa; color: var(--text-secondary); }
.sidebar-item.active { background: var(--accent-blue-light); color: var(--accent-blue); }
.sidebar-item .icon { font-size: 18px; }

/* CONTENT */
.content { flex: 1; padding: 20px; min-width: 0; }
.breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }

/* GRID: 4 equal columns, 3 rows */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto;
  gap: 14px;
  align-items: start;
}

/* CARD BASE */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* OVERVIEW: col1 row1 span2 */
.overview-card { grid-column: 1; grid-row: 1; min-height: unset; }
.overview-stat { display: flex; flex-direction: column; gap: 11px; }
.overview-item { display: flex; flex-direction: column; gap: 2px; }
.overview-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.overview-value { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.overview-value.red { color: var(--accent-red); font-weight: 700; }
.overview-value.orange { color: var(--accent-amber); font-weight: 700; }
.overview-value.green { color: var(--accent-green); font-weight: 700; }
.overview-value.large { font-size: 22px; font-weight: 800; line-height: 1; }
.overview-bar { height: 5px; background: #e8ecf0; border-radius: 3px; overflow: hidden; margin-top: 2px; }
.overview-bar-fill { height: 100%; border-radius: 3px; }

/* RADAR: cols 2-3 rows 1-2 (big center square) */
.radar-card { grid-column: 2 / 4; grid-row: 1 / 3; display: flex; flex-direction: column; }
.radar-body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; position: relative; padding: 12px; }
#radarChart { width: 85% !important; height: auto !important; }

.result-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.95); border: 1px solid var(--border); border-radius: 16px; padding: 12px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); min-width: 110px; }
.result-badge.fail { border-color: rgba(220,38,38,0.3); }
.result-badge .label { font-size: 10px; color: var(--accent-red); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 2px; }
.result-badge .score { font-size: 34px; font-weight: 900; color: var(--accent-red); line-height: 1; }
.result-badge .unit { font-size: 11px; color: var(--accent-red); font-weight: 500; }
.result-badge.pass { border-color: rgba(22,163,74,0.3); }
.result-badge.pass .label { color: var(--accent-green); }
.result-badge.pass .score { color: var(--accent-green); }
.result-badge.pass .unit { color: var(--accent-green); }

.eval-conclusion { width: 100%; text-align: center; font-size: 11px; color: var(--text-muted); background: #f5f7fa; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; border-left: 3px solid var(--accent-blue); flex-shrink: 0; }

/* QUICK: col4 row1 */
.quick-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tile { background: #f5f7fa; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: all 0.2s; }
.tile:hover { background: var(--accent-blue-light); border-color: var(--accent-blue); transform: translateY(-2px); }
.tile-icon { font-size: 20px; font-weight: 700; }
.tile-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

/* SCORE: col1 row3 */
.score-list { display: flex; flex-direction: column; gap: 7px; }
.score-item { display: flex; align-items: center; gap: 8px; }
.score-label { font-size: 11px; color: var(--text-secondary); width: 68px; flex-shrink: 0; }
.score-bar-wrap { flex: 1; height: 5px; background: #e8ecf0; border-radius: 3px; overflow: visible; position: relative; }
.score-pass-line { position: absolute; left: 70%; top: -2px; bottom: -2px; width: 1px; background: rgba(0,0,0,0.1); }
.score-bar { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; }
.score-bar.high { background: var(--accent-blue); }
.score-bar.mid { background: var(--accent-amber); }
.score-bar.low { background: var(--accent-red); }
.score-num { font-size: 11px; font-weight: 700; width: 26px; text-align: right; flex-shrink: 0; }
.score-num.high { color: var(--accent-blue); }
.score-num.mid { color: var(--accent-amber); }
.score-num.low { color: var(--accent-red); }

/* SUBSYSTEM: col4 row3 */
.subsystem-list { display: flex; flex-direction: column; gap: 5px; }
.subsystem-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: #f5f7fa; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.subsystem-item:hover { background: var(--accent-blue-light); border-color: var(--accent-blue); }
.subsystem-name { font-size: 11px; color: var(--text-secondary); }
.subsystem-status { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-dot.ok { background: var(--accent-green); }
.status-dot.warn { background: var(--accent-amber); }
.status-dot.err { background: var(--accent-red); animation: pulse-err 2s infinite; }
@keyframes pulse-err { 0%,100%{opacity:1}50%{opacity:0.4} }
.status-text.ok { color: var(--accent-green); }
.status-text.warn { color: var(--accent-amber); }
.status-text.err { color: var(--accent-red); }

/* BOTTOM 3 EQUAL */
.bottom-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.mini-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.mini-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.mini-card-title { font-size: 13px; font-weight: 600; color: #1a2332; display: flex; align-items: center; gap: 8px; }
.mini-card-count { font-size: 10px; color: var(--text-muted); background: #f5f7fa; padding: 2px 7px; border-radius: 8px; border: 1px solid var(--border); }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding: 0 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table td { padding: 8px 6px; font-size: 11px; color: var(--text-secondary); border-bottom: 1px solid #f0f2f5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--accent-blue-light); }
.blue-link { color: #5a6475; cursor: pointer; text-decoration: none; }
.blue-link:hover { text-decoration: underline; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 5px; font-size: 10px; font-weight: 600; }
.tag.ok { background: rgba(22,163,74,0.1); color: var(--accent-green); }
.tag.warn { background: rgba(220,38,38,0.1); color: var(--accent-red); }

.pagination { display: flex; align-items: center; gap: 3px; margin-top: 10px; justify-content: flex-end; }
.pagination button { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.pagination button:hover { background: #f5f7fa; }
.pagination button.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.pagination-info { font-size: 10px; color: var(--text-muted); margin-left: 6px; }

.notice-list { display: flex; flex-direction: column; }
.notice-item { display: flex; align-items: flex-start; gap: 9px; padding: 8px 0; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: all 0.2s; }
.notice-item:last-child { border-bottom: none; }
.notice-item:hover { background: var(--accent-blue-light); border-radius: 8px; padding-left: 6px; }
.notice-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; margin-top: 1px; }
.notice-icon.urgent { background: rgba(220,38,38,0.1); color: var(--accent-red); }
.notice-icon.warn { background: rgba(217,119,6,0.1); color: var(--accent-amber); }
.notice-icon.info { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.notice-icon.normal { background: #f5f7fa; color: var(--text-muted); }
.notice-body { flex: 1; min-width: 0; }
.notice-title { font-size: 11px; color: var(--text-secondary); line-height: 1.5; font-weight: 500; display: flex; align-items: center; gap: 5px; }
.notice-tag { font-size: 9px; padding: 1px 5px; border-radius: 4px; flex-shrink: 0; }
.notice-tag.urgent { background: rgba(220,38,38,0.1); color: var(--accent-red); }
.notice-tag.new { background: rgba(22,163,74,0.1); color: var(--accent-green); }
.notice-tag.info { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.notice-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* RESPONSIVE */
@media (max-width: 1100px) {
  .bottom-row { grid-template-columns: 1fr 1fr; }
  .bottom-row .mini-card:last-child { grid-column: 1 / -1; }
}
@media (max-width: 800px) {
  .sidebar { display: none; }
  .grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
  .overview-card { grid-column: 1; grid-row: 1; min-height: unset; }
  .radar-card { grid-column: 1 / -1; grid-row: 1 / 3; }
  .quick-card { grid-column: 4; grid-row: 1; }
  .score-card { grid-column: 1; grid-row: 2; min-height: unset; }
  .subsystem-card { grid-column: 4; grid-row: 2; min-height: unset; }
  .bottom-row { grid-column: 1 / -1; grid-template-columns: 1fr; }
}

/* 评价页专用 */
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; flex-direction: column; gap: 4px; transition: box-shadow 0.2s; }
.stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 28px; font-weight: 800; line-height: 1.1; }
.stat-value.blue { color: var(--accent-blue); }
.stat-value.green { color: var(--accent-green); }
.stat-value.red { color: var(--accent-red); }
.stat-value.amber { color: var(--accent-amber); }
.stat-value.purple { color: var(--accent-purple); }
.stat-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.search-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { height: 34px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 13px; color: var(--text-primary); background: var(--bg-card); outline: none; min-width: 180px; flex: 1; transition: border-color 0.2s; }
.search-bar input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-light); }
.search-bar select { height: 34px; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; font-size: 13px; color: var(--text-secondary); background: var(--bg-card); outline: none; cursor: pointer; transition: border-color 0.2s; }
.search-bar select:focus { border-color: var(--accent-blue); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); transition: all 0.2s; white-space: nowrap; }
.btn:hover { background: #f5f7fa; color: var(--text-primary); }
.btn.primary { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.btn.primary:hover { background: #1d4ed8; color: #fff; }
.btn.success { background: var(--accent-green); color: #fff; border-color: var(--accent-green); }
.btn.success:hover { background: #15803d; color: #fff; }
.grid { display: grid; gap: 14px; align-items: start; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-2 { grid-template-columns: 1fr 1fr; }
.score-item { display: flex; align-items: center; gap: 10px; }
.score-label { font-size: 12px; color: var(--text-secondary); width: 88px; flex-shrink: 0; }
.score-bar-wrap { flex: 1; height: 8px; background: #e8ecf0; border-radius: 4px; overflow: hidden; position: relative; }
.score-pass-line { position: absolute; left: 70%; top: -2px; bottom: -2px; width: 1px; background: rgba(0,0,0,0.15); }
.score-bar { height: 100%; border-radius: 4px; position: absolute; left: 0; top: 0; }
.score-bar.high { background: var(--accent-green); }
.score-bar.mid { background: var(--accent-amber); }
.score-bar.low { background: var(--accent-red); }
.score-num { font-size: 12px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }
.score-num.high { color: var(--accent-green); }
.score-num.mid { color: var(--accent-amber); }
.score-num.low { color: var(--accent-red); }
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.tag.ok { background: rgba(22,163,74,0.1); color: var(--accent-green); }
.tag.warn { background: rgba(220,38,38,0.1); color: var(--accent-red); }
.tag.info { background: rgba(37,99,235,0.1); color: var(--accent-blue); }
.tag.amber { background: rgba(217,119,6,0.1); color: var(--accent-amber); }
.blue-link { color: var(--accent-blue); cursor: pointer; text-decoration: none; }
.blue-link:hover { text-decoration: underline; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; padding: 0 8px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
.data-table td { padding: 10px 8px; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid #f0f2f5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--accent-blue-light); }
.pagination { display: flex; align-items: center; gap: 4px; margin-top: 12px; justify-content: flex-end; }
.pagination button { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.pagination button:hover { background: #f5f7fa; }
.pagination button.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.pagination-info { font-size: 11px; color: var(--text-muted); margin-left: 8px; }
</style></head><body><div class="header"><div class="logo"><div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="building" aria-hidden="true" style="width:16px;height:16px;" class="lucide lucide-building"><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M12 6h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M16 6h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path><path d="M8 6h.01"></path><path d="M9 22v-3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"></path><rect x="4" y="2" width="16" height="20" rx="2"></rect></svg></div>' + title + '</div><div class="header-right"><div class="header-time" id="clock">--:--:--</div><div class="header-user">王矿长</div></div></div><div class="main-wrapper"><div class="sidebar">' + sb_items + '</div><div class="content"><div class="breadcrumb">' + bc + '</div>' + content + '</div></div><script>function updateClock(){var n=new Date(),e=document.getElementById("clock");if(e)e.textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0")+":"+String(n.getSeconds()).padStart(2,"0");}setInterval(updateClock,1e3);updateClock();if(typeof lucide!=="undefined")lucide.createIcons();</script></body></html>
